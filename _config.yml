# Site settings
title: 小猪爱洗澡
tagline: "Cyber's Blog"
description: >-
  技术与生活的个人博客 — 记录思考，分享创造。
author: Cyber
email: ""

# URLs
url: "https://2789411801-cyber.github.io"
baseurl: ""
permalink: /:year/:month/:day/:title/

# Logo (optional — set to a path like /assets/images/logo.svg)
logo: ""

# Social links
social:
  github: "2789411801-cyber"
  twitter: ""
  linkedin: ""

# Pagination
paginate: 5
paginate_path: "/page:num/"

# Build settings
markdown: kramdown
highlighter: rouge
plugins:
  - jekyll-paginate
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .gitignore
  - vendor/

# Default front matter
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      sidebar: true
  - scope:
      path: ""
      type: pages
    values:
      layout: page
      sidebar: true
  - scope:
      path: "pages/about.md"
    values:
      sidebar: false

# Kramdown settings
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Footer about text
footer_about: "小猪爱洗澡 — Cyber 的个人博客。记录技术与生活的思考，用 Jekyll 构建，部署于 GitHub Pages。"
